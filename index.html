<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>きょうのよてい</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="icon" href="icon-bolog.png" type="image/png">
<link rel="apple-touch-icon" href="icon-bolog.png">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ローディング画面 -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-text">よみこみ中…</div>
  </div>

  <!-- 合言葉（パスワード）入力画面。認証されるまではこれだけを表示する -->
  <div id="password-screen" class="password-screen hidden">
    <div class="password-card">
      <div class="password-title">きょうのよてい</div>
      <div class="password-hint">おうちの合言葉を入力してください</div>
      <input type="password" id="password-input" class="password-input" autocomplete="off" />
      <div id="password-error" class="password-error hidden">合言葉が違います</div>
      <button id="password-submit-btn" class="password-submit-btn">はじめる</button>
    </div>
  </div>

  <!-- アプリ本体のルート。screen ごとに JS が innerHTML を差し替える -->
  <div id="app" class="app hidden"></div>

  <!-- 常時表示のナビゲーション（ホームへ戻る／設定） -->
  <div id="top-right-nav" class="top-right-nav hidden">
    <button id="home-nav-btn" class="nav-icon-btn" aria-label="ホームに戻る">🏠</button>
    <button id="global-settings-btn" class="nav-icon-btn" aria-label="せってい">⚙️</button>
  </div>

  <!-- 紙吹雪レイヤー -->
  <div id="confetti-layer" class="confetti-layer hidden"></div>

  <!-- Complete / スタンプ選択モーダル -->
  <div id="stamp-modal" class="modal-overlay hidden">
    <div class="modal-sheet stamp-sheet">
      <div class="complete-title">🎉 Complete!</div>
      <div id="cheer-message" class="cheer-message"></div>
      <div class="stamp-prompt">きょうのスタンプをえらんでね</div>
      <div id="stamp-grid" class="stamp-grid"></div>
    </div>
  </div>

  <!-- 設定画面（フルスクリーン） -->
  <div id="settings-screen" class="settings-screen hidden">
    <div class="settings-header">
      <div class="settings-title">せってい</div>
      <button id="settings-close-btn" class="icon-btn" aria-label="閉じる">✕</button>
    </div>
    <div class="settings-tabs">
      <button id="tab-templates-btn" class="tab-btn active" data-tab="templates">テンプレート</button>
      <button id="tab-parent-btn" class="tab-btn" data-tab="parent">おうちの人設定</button>
    </div>
    <div id="settings-body" class="settings-body"></div>
  </div>

  <!-- Firebase (Firestore) : モジュール形式CDN読み込み -->
  <script type="module" src="app.js"></script>
</body>
</html>
